<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
    <title>Login Mobile</title>
</head>
<body>

    <div class="app">

        <!-- LOGIN -->
        <div class="form active" id="login">

            <p class="subtitle">Login ke akun kamu</p>

            <div class="input-group">
                <input type="text" id="loginUser" required>
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="password" id="loginPass" required>
                <label>Password</label>
            </div>

            <label class="check">
                <input type="checkbox" id="showLogin">
                <span class="custom-check"></span>
                <span class="text">Show Password</span>
            </label>

            <button id="btnLogin">Login</button>

            <p>Belum punya akun? 
                <span id="toRegister">Register</span>
            </p>

            <p>
                <span id="toForgot">Forgot Password?</span>
            </p>
        </div>

        <!-- REGISTER -->
        <div class="form" id="register">

            <p class="subtitle">Daftar akun baru</p>

            <div class="input-group">
                <input type="text" id="regUser" required>
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="password" id="regPass" required>
                <label>Password</label>
            </div>

            <label class="check">
                <input type="checkbox" id="showRegister"> <!-- FIX -->
                <span class="custom-check"></span>
                <span class="text">Show Password</span>
            </label>

            <button id="btnRegister">Register</button>

            <p>Sudah punya akun? 
                <span id="toLogin">Login</span>
            </p>
        </div>

        <!-- FORGOT -->
    <div class="form" id="forgot">

            <p class="subtitle">Masukkan data akun</p>

            <div class="input-group">
                <input type="text" id="fpUser" required>
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="password" id="newPass" required>
                <label>Password Baru</label>
            </div>

            <!-- TAMBAHKAN INI -->
            <label class="check">
                <input type="checkbox" id="showForgot">
                <span class="custom-check"></span>
                <span class="text">Show Password</span>
            </label>

            <button id="btnReset">Reset Password</button>

            <p>
                <span id="backLogin">Kembali ke Login</span>
            </p>

        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
